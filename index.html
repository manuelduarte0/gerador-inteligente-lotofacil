<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>LOTOFACIL INTELIGENTE</title><style>
*{box-sizing:border-box}
body{background:#0A0A0A;color:#fff;font-family:Arial;margin:0;padding:0}
.btnMenu{position:fixed;top:10px;left:10px;z-index:1000;font-size:28px;background:#FFD700;border:none;color:#000;padding:8px 14px;border-radius:8px;cursor:pointer}
.menu{position:fixed;left:-260px;top:0;width:240px;height:100%;background:#111;padding:15px;border-right:3px solid #FFD700;transition:.3s;z-index:999;overflow-y:auto}
.menu.ativo{left:0}.menu h3{color:#FFD700;text-align:center;margin:5px 0}
.jogoSalvoMenu{background:#222;padding:8px;margin:5px 0;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #FFD700;position:relative;word-break:break-all}
.btnApagarJogo{position:absolute;top:2px;right:2px;background:red;color:#fff;border:none;padding:2px 6px;border-radius:4px;font-size:10px;cursor:pointer}
.conteudo{padding:60px 15px 15px;text-align:center}h1{color:#FFD700;margin:0 0 15px 0}
button{padding:10px 15px;background:#FFD700;border:none;border-radius:10px;cursor:pointer;font-weight:bold;margin:5px;color:#000;font-size:14px}
.boxGerador{background:#222;padding:20px;border-radius:15px;margin:20px auto;max-width:500px;border:3px solid #FFD700}
.tituloSecao{color:#FFD700;font-size:16px;margin:15px 0 8px 0;font-weight:bold}
.listaOpcoes{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0;min-height:45px}
.btnOpcao{padding:8px 10px;background:#333;border:2px solid #555;border-radius:8px;cursor:pointer;font-size:12px;color:#fff}
.btnOpcao.ativo{background:#FFD700;color:#000;border-color:#FFD700}
.gridNumeros{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;max-width:300px;margin:10px auto}
.numero{width:100%;aspect-ratio:1/1;border:2px solid #444;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:bold;background:#222;cursor:pointer;font-size:14px}
.numeroFixo{background:#FFD700!important;color:#000!important;border-color:#FFD700!important}
.resultadoGerado{background:#111;border:3px solid #FFD700;padding:15px;margin:15px 0;border-radius:10px;text-align:left}
textarea{width:95%;height:100px;background:#222;color:#fff;border:2px solid #FFD700;border-radius:8px;padding:8px;margin:10px 0;font-family:monospace;font-size:11px}
</style></head><body>
<button class="btnMenu" onclick="toggleMenu()">☰</button>

<div class="menu" id="menuLateral">
<h3>💾 JOGOS SALVOS</h3>
<p style="font-size:12px;color:#aaa;text-align:center">Total: <span id="qtdJogos">0</span>/50</p>
<textarea id="txtImportar" placeholder="01,02,03,04,05,06,07,08,09,10,11,12,13,14,15"></textarea>
<button onclick="importarJogos()" style="width:100%">📥 IMPORTAR JOGOS</button>
<div id="listaJogosSalvos"></div>
<button onclick="limparTodosJogos()" style="background:red;color:#fff;width:100%;margin-top:10px">🗑️ LIMPAR TUDO</button>
</div>

<div class="conteudo">
<h1>LOTOFACIL</h1>
<div class="boxGerador">
<div class="tituloSecao">🎯 ESCOLHA OS FILTROS</div>

<div class="tituloSecao">1. FÓRMULA 5x5</div>
<div id="lista5x5" class="listaOpcoes"></div>

<div class="tituloSecao">2. FÓRMULA PADRÃO</div>
<div id="listaPadrao" class="listaOpcoes"></div>

<div class="tituloSecao">3. FÓRMULA ZUD</div>
<div id="listaZUD" class="listaOpcoes"></div>

<div class="tituloSecao">4. PARES E ÍMPARES PI</div>
<div id="listaPI" class="listaOpcoes"></div>

<div class="tituloSecao">5. ATÉ 7 NÚMEROS FIXOS</div>
<div id="gridNumeros" class="gridNumeros"></div>
<button onclick="limparFixos()">LIMPAR FIXOS</button>

<div class="tituloSecao">6. SEQUÊNCIAS QUE MAIS REPETEM</div>
<div id="listaSeq" class="listaOpcoes"></div>

<button style="font-size:18px;padding:15px 30px;margin-top:15px;width:90%" onclick="gerarJogo()">🎲 GERAR JOGO</button>
<div id="resultado"></div>
</div>
</div>

<script>
let bancoGerador=JSON.parse(localStorage.getItem('bancoGerador'))||[];
let filtro5x5=null,filtroPadrao=null,filtroZUD=null,filtroPI=null,numerosFixos=[],sequenciaFixa="";
const opcoesPI=['6.9','7.8','8.7','9.6'];

document.addEventListener('DOMContentLoaded',function(){
  criarGrid();montarBotoes();atualizarMenu();
});

function toggleMenu(){document.getElementById('menuLateral').classList.toggle('ativo')}
function criarGrid(){let h="";for(let i=1;i<=25;i++){let n=i.toString().padStart(2,'0');h+=`<div class="numero" id="n${n}" onclick="toggleFixo('${n}')">${n}</div>`}document.getElementById('gridNumeros').innerHTML=h}
function toggleFixo(n){if(numerosFixos.includes(n)){numerosFixos=numerosFixos.filter(x=>x!=n);document.getElementById('n'+n).classList.remove('numeroFixo')}else{if(numerosFixos.length>=7)return alert("Máximo 7 números fixos");numerosFixos.push(n);document.getElementById('n'+n).classList.add('numeroFixo')}}
function limparFixos(){numerosFixos=[];document.querySelectorAll('.numeroFixo').forEach(e=>e.classList.remove('numeroFixo'))}

function importarJogos(){
let txt=document.getElementById('txtImportar').value.trim();
if(!txt)return alert("Cole os jogos primeiro");
let linhas=txt.split('\n');let adicionados=0;
linhas.forEach(linha=>{
let nums=linha.replace(/\s/g,'').split(',').map(n=>n.padStart(2,'0'));
if(nums.length==15 && bancoGerador.length<50){
  if(!verificarDuplicado(nums)){
    let obj={id:Date.now()+Math.random(),numeros:nums,data:"IMPORTADO",'5x5':calcular5x5(nums.map(Number)),padrao:calcularPadrao(nums.map(Number)),zud:calcularZUD(nums.map(Number)),pi:calcularPI(nums.map(Number))};
    bancoGerador.push(obj);adicionados++;
  }
}
});
localStorage.setItem('bancoGerador',JSON.stringify(bancoGerador));
atualizarMenu();montarBotoes();document.getElementById('txtImportar').value="";
alert(`${adicionados} jogos importados!`);
}

function montarBotoes(){
try{
  let mapa5x5={},mapaPadrao={},mapaZUD={},mapaPI={},mapaSeq={};
  
  bancoGerador.forEach(j=>{
    if(!mapa5x5[j['5x5']])mapa5x5[j['5x5']]=0;mapa5x5[j['5x5']]++;
    if(!mapaPadrao[j.padrao])mapaPadrao[j.padrao]=0;mapaPadrao[j.padrao]++;
    if(!mapaZUD[j.zud])mapaZUD[j.zud]=0;mapaZUD[j.zud]++;
    if(!mapaPI[j.pi])mapaPI[j.pi]=0;mapaPI[j.pi]++;
    
    let d=[...j.numeros].sort((a,b)=>a-b);
    for(let t=5;t<=10;t++){gerarComb(d,t).forEach(c=>{let k=c.join(',');if(!mapaSeq[k])mapaSeq[k]=0;mapaSeq[k]++})}
  });
  
  let h5x5="",hPadrao="",hZUD="",hPI="",hSeq="";
  
  Object.keys(mapa5x5).sort((a,b)=>mapa5x5[b]-mapa5x5[a]).slice(0,15).forEach(p=>h5x5+=`<button class="btnOpcao" id="b5x5_${p}" onclick="set5x5('${p}')">${p} (${mapa5x5[p]}x)</button>`);
  Object.keys(mapaPadrao).sort((a,b)=>mapaPadrao[b]-mapaPadrao[a]).slice(0,15).forEach(p=>hPadrao+=`<button class="btnOpcao" id="bPadrao_${p}" onclick="setPadrao('${p}')">${p} (${mapaPadrao[p]}x)</button>`);
  Object.keys(mapaZUD).sort((a,b)=>mapaZUD[b]-mapaZUD[a]).slice(0,15).forEach(p=>hZUD+=`<button class="btnOpcao" id="bZUD_${p}" onclick="setZUD('${p}')">${p} (${mapaZUD[p]}x)</button>`);
  opcoesPI.forEach(p=>hPI+=`<button class="btnOpcao" id="bPI_${p}" onclick="setPI('${p}')">${p}</button>`);
  Object.keys(mapaSeq).filter(k=>mapaSeq[k]>=2).sort((a,b)=>mapaSeq[b]-mapaSeq[a]).slice(0,20).forEach(s=>hSeq+=`<button class="btnOpcao" id="bSeq_${s}" onclick="setSeq('${s}')">${s} (${mapaSeq[s]}x)</button>`);

  document.getElementById('lista5x5').innerHTML=h5x5||"<p style='color:#aaa;font-size:12px'>Importe jogos</p>";
  document.getElementById('listaPadrao').innerHTML=hPadrao||"<p style='color:#aaa;font-size:12px'>Importe jogos</p>";
  document.getElementById('listaZUD').innerHTML=hZUD||"<p style='color:#aaa;font-size:12px'>Importe jogos</p>";
  document.getElementById('listaPI').innerHTML=hPI;
  document.getElementById('listaSeq').innerHTML=hSeq||"<p style='color:#aaa;font-size:12px'>Importe 10+ jogos</p>";
}catch(e){console.log(e)}
}

function set5x5(p){filtro5x5=filtro5x5==p?null:p;atualizar()}
function setPadrao(p){filtroPadrao=filtroPadrao==p?null:p;atualizar()}
function setZUD(p){filtroZUD=filtroZUD==p?null:p;atualizar()}
function setPI(p){filtroPI=filtroPI==p?null:p;atualizar()}
function setSeq(s){sequenciaFixa=sequenciaFixa==s?"":s;atualizar()}
function atualizar(){document.querySelectorAll('.btnOpcao').forEach(b=>b.classList.remove('ativo'));if(filtro5x5)document.getElementById('b5x5_'+filtro5x5)?.classList.add('ativo');if(filtroPadrao)document.getElementById('bPadrao_'+filtroPadrao)?.classList.add('ativo');if(filtroZUD)document.getElementById('bZUD_'+filtroZUD)?.classList.add('ativo');if(filtroPI)document.getElementById('bPI_'+filtroPI)?.classList.add('ativo');if(sequenciaFixa)document.getElementById('bSeq_'+sequenciaFixa)?.classList.add('ativo')}

function calcular5x5(d){return`${d.filter(n=>n>=1&&n<=5).length}.${d.filter(n=>n>=6&&n<=10).length}.${d.filter(n=>n>=11&&n<=15).length}.${d.filter(n=>n>=16&&n<=20).length}.${d.filter(n=>n>=21&&n<=25).length}`}
function calcularPadrao(d){return`${d.filter(n=>n<=9).length}.${d.filter(n=>n>=10&&n<=19).length}.${d.filter(n=>n>=20).length}`}
function calcularZUD(d){let z=d.filter(n=>n<=9),u=d.filter(n=>n>=10&&n<=19),d2=d.filter(n=>n>=20);return`${z.filter(n=>n%2==0).length}.${z.length-z.filter(n=>n%2==0).length} / ${u.filter(n=>n%2==0).length}.${u.length-u.filter(n=>n%2==0).length} / ${d2.filter(n=>n%2==0).length}.${d2.length-d2.filter(n=>n%2==0).length}`}
function calcularPI(d){return`${d.filter(n=>n%2==0).length}.${d.filter(n=>n%2!=0).length}`}
function gerarComb(arr,t){let r=[];function c(i,o){if(o.length==t){r.push([...o]);return}for(let j=i;j<arr.length;j++){o.push(arr[j]);c(j+1,o);o.pop()}}c(0,[]);return r}
function verificarDuplicado(novo){for(let j of bancoGerador){let iguais=novo.filter(n=>j.numeros.includes(n)).length;if(iguais>=15)return true}return false}

function gerarJogo(){
if(bancoGerador.length<10)return alert("Importe pelo menos 10 jogos primeiro");
if(bancoGerador.length>=50)return alert("Limite de 50 jogos atingido.");
if(!filtro5x5&&!filtroPadrao&&!filtroZUD&&!filtroPI&&numerosFixos.length==0&&sequenciaFixa=="")return alert("Selecione pelo menos 1 filtro");

let tentativas=0,jogo;
while(tentativas<100000){ // AUMENTEI
jogo=[];let pool=Array.from({length:25},(_,i)=>(i+1).toString().padStart(2,'0'));
if(numerosFixos.length>0)jogo=[...numerosFixos];
if(sequenciaFixa!="")jogo=[...new Set([...jogo,...sequenciaFixa.split(',')])];
pool=pool.filter(n=>!jogo.includes(n));
while(jogo.length<15){let idx=Math.floor(Math.random()*pool.length);jogo.push(pool.splice(idx,1)[0])}
jogo.sort((a,b)=>a-b);
let p5=calcular5x5(jogo.map(Number)),pPad=calcularPadrao(jogo.map(Number)),pZUD=calcularZUD(jogo.map(Number)),pPI=calcularPI(jogo.map(Number));
if((!filtro5x5||p5==filtro5x5)&&(!filtroPadrao||pPad==filtroPadrao)&&(!filtroZUD||pZUD==filtroZUD)&&(!filtroPI||pPI==filtroPI)){
  if(!verificarDuplicado(jogo)){salvarJogo(jogo,p5,pPad,pZUD,pPI);montarBotoes();return}
}tentativas++;}
alert("Não achei nenhum jogo novo com esses filtros juntos.\n\nDica: Tente usar só 1 ou 2 filtros por vez.\nEx: Só a Sequência ou Só o PI");
}

function salvarJogo(n,p5,pPad,pZUD,pPI){
if(bancoGerador.length>=50)return;
let obj={id:Date.now(),numeros:n,data:new Date().toLocaleString(),'5x5':p5,padrao:pPad,zud:pZUD,pi:pPI};
bancoGerador.push(obj);localStorage.setItem('bancoGerador',JSON.stringify(bancoGerador));
mostrarResultado(obj);atualizarMenu();
}
function mostrarResultado(j){
document.getElementById('resultado').innerHTML=`<div class="resultadoGerado">
<h3>🎯 JOGO GERADO #${bancoGerador.length}</h3>
<p style="font-size:18px;text-align:center"><b>${j.numeros.join(", ")}</b></p>
<p><b>5x5:</b> ${j['5x5']} | <b>PADRÃO:</b> ${j.padrao}</p>
<p><b>ZUD:</b> ${j.zud} | <b>PI:</b> ${j.pi}</p>
<button onclick="copiar('${j.numeros.join(", ")}')">📋 COPIAR</button>
</div>`;
}
function copiar(t){navigator.clipboard.writeText(t);alert("Copiado!")}
function apagarJogo(id){bancoGerador=bancoGerador.filter(j=>j.id!=id);localStorage.setItem('bancoGerador',JSON.stringify(bancoGerador));atualizarMenu();montarBotoes()}
function atualizarMenu(){
let h="";bancoGerador.slice().reverse().forEach(j=>{
h+=`<div class="jogoSalvoMenu" onclick="navigator.clipboard.writeText('${j.numeros.join(", ")}')">
<button class="btnApagarJogo" onclick="event.stopPropagation();apagarJogo(${j.id})">X</button>
<b>#${bancoGerador.indexOf(j)+1}</b> ${j.numeros.join(", ")}<br>
<small>5x5:${j['5x5']} P:${j.padrao}</small>
</div>`;});document.getElementById('listaJogosSalvos').innerHTML=h||"<p style='color:#aaa;font-size:12px'>Nenhum jogo</p>";
document.getElementById('qtdJogos').innerText=bancoGerador.length;
}
function limparTodosJogos(){if(confirm("Apagar todos?")){bancoGerador=[];localStorage.setItem('bancoGerador','[]');atualizarMenu();document.getElementById('resultado').innerHTML="";montarBotoes()}}
</script></body></html>
